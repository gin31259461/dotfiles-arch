# Hyprland Configuration
# https://wiki.hyprland.org/

# Initial boot — applies wallpapers, theming, and new settings on first run.
# Remove ~/.config/hypr/.initial_startup_done to re-trigger.
exec-once = $HOME/.config/hypr/initial-boot.sh

# ── Configuration ─────────────────────────────────────────────────────────────
source = $HOME/.config/hypr/conf.d/env.conf
source = $HOME/.config/hypr/conf.d/appearance.conf
source = $HOME/.config/hypr/conf.d/autostart.conf
source = $HOME/.config/hypr/conf.d/input.conf
source = $HOME/.config/hypr/conf.d/layout.conf
source = $HOME/.config/hypr/conf.d/misc.conf
source = $HOME/.config/hypr/conf.d/keybinds.conf
source = $HOME/.config/hypr/conf.d/window-rules.conf

# ── Dynamic (managed by nwg-displays) ─────────────────────────────────────────
source = $HOME/.config/hypr/monitors.conf
source = $HOME/.config/hypr/workspaces.conf
