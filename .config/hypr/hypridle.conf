# Hypridle
# Original config submitted by https://github.com/SherLock707

general {
  lock_cmd             = pidof hyprlock || hyprlock  # avoid duplicate hyprlock instances
  before_sleep_cmd     = loginctl lock-session       # lock before suspend
  after_sleep_cmd      = hyprctl dispatch dpms on    # wake screen after resume
  ignore_dbus_inhibit  = false                       # respect dbus idle-inhibit (e.g. firefox, steam)
}

# Idle warning, screen lock, screen-off, and suspend listeners are managed by noctalia-shell.
