# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# User-specific keybinds and overrides.
# Check ~/.config/hypr/configs/Keybinds.conf first to avoid conflicts.
# IMPORTANT: unbind defaults before rebinding the same key.

# See https://wiki.hyprland.org/Configuring/Keywords/ for variables and binds
# See also UserConfigs/Laptops.conf for laptop-specific keybinds

# /* ---- ✴️ Variables ✴️ ---- */  #
$mainMod     = SUPER
$scriptsDir  = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts
$UserConfigs = $HOME/.config/hypr/UserConfigs

# ── Application Launcher ─────────────────────────────────────────
# Override default Super+D (rofi) with noctalia-shell launcher
unbind = $mainMod, D
bindd  = $mainMod, D, noctalia-shell application launcher, exec, qs -c noctalia-shell ipc call launcher toggle

# ── Session Menu ─────────────────────────────────────────────────
# Override default Ctrl+Alt+L (lock screen) with noctalia session menu
unbind = CTRL ALT, L
bindd  = CTRL ALT, L, noctalia-shell session menu, exec, qs -c noctalia-shell ipc call sessionMenu toggle

# ── App Binds ────────────────────────────────────────────────────
# Override default Super+N (night light / Hyprsunset) with Obsidian
unbind = $mainMod, N
bindd  = $mainMod, N, open obsidian, exec, obsidian

# ── Volume Controls ──────────────────────────────────────────────
# Override default Volume.sh binds with noctalia-shell IPC calls
unbind = , xf86audioraisevolume
unbind = , xf86audiolowervolume
unbind = ALT, xf86audioraisevolume
unbind = ALT, xf86audiolowervolume
unbind = , xf86AudioMicMute
unbind = , xf86audiomute

bindeld = , xf86audiolowervolume, volume down,    exec, qs -c noctalia-shell ipc call volume decrease
bindeld = , xf86audioraisevolume, volume up,      exec, qs -c noctalia-shell ipc call volume increase
bindld  = , xf86AudioMicMute,    toggle mic mute, exec, qs -c noctalia-shell ipc call volume muteInput
bindld  = , xf86audiomute,       toggle mute,     exec, qs -c noctalia-shell ipc call volume muteOutput
