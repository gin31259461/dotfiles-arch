# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# For window rules and layerrules
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# This file is used to add or overwrite window rules
# This file will not be modified during dotfiles updates

# Notion
windowrule = match:class ^([Nn]otion)$, workspace 10

# Line — tag assignments
windowrule = match:class ^(line.exe)$ match:title ^(LINE)$, tag +line_main_window
windowrule = match:class ^(line.exe)$ match:title ^$,       tag +line_sub_window
windowrule = match:class ^(explorer.exe)$,                  tag +line_explorer

# Line — workspace and float rules (by tag)
windowrule = match:tag line_main_window*, workspace 9, float on
windowrule = match:tag line_sub_window*,  workspace 9, float on
windowrule = match:tag line_explorer*,    workspace 9, float on
