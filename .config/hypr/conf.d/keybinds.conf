# ══════════════════════════════════════════════════════════════
#  Keybinds
# ══════════════════════════════════════════════════════════════

# ── Variables ──
$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts

# ── Application Launchers ──
bindd = $mainMod, D, application launcher, exec, qs -c noctalia-shell ipc call launcher toggle
bindd = $mainMod, B, open default browser, exec, xdg-open "https://"
bindd = $mainMod, A, desktop overview, exec, $scriptsDir/session/overview-toggle.sh
bindd = $mainMod, Return, open terminal, exec, $term
bindd = $mainMod, E, file manager, exec, $files

# ── Features / Extras ──
bindd = $mainMod, T, global theme switcher, exec, $scriptsDir/display/theme-changer.sh
bindd = $mainMod SHIFT, T, apply noctalia material theme, exec, $scriptsDir/display/noctalia-theme.sh
bindd = $mainMod, H, cheat sheet, exec, $scriptsDir/input/key-hints.sh
bindd = $mainMod SHIFT, E, quick settings, exec, $scriptsDir/rofi/quick-settings.sh
bindd = $mainMod ALT, E, emoji menu, exec, $scriptsDir/rofi/rofi-emoji.sh
bindd = $mainMod, S, web search, exec, $scriptsDir/rofi/rofi-search.sh
bindd = $mainMod CTRL, S, window switcher, exec, rofi -show window
bindd = $mainMod ALT, O, toggle blur, exec, $scriptsDir/display/change-blur.sh
bindd = $mainMod SHIFT, G, toggle game mode, exec, $scriptsDir/session/game-mode.sh
bindd = $mainMod ALT, L, toggle layout, exec, $scriptsDir/input/change-layout.sh
bindd = $mainMod ALT, V, clipboard manager, exec, $scriptsDir/rofi/clip-manager.sh
bindd = $mainMod CTRL, R, rofi theme selector, exec, $scriptsDir/rofi/rofi-theme-selector.sh
bindd = $mainMod CTRL SHIFT, R, rofi theme selector (modified), exec, pkill rofi || true && $scriptsDir/rofi/rofi-theme-selector-modified.sh
bindd = $mainMod, N, open obsidian, exec, obsidian

# ── Extras ──
bindd = $mainMod SHIFT, M, online music, exec, $scriptsDir/media/rofi-beats.sh
bindd = $mainMod CTRL, O, toggle active window opacity, setprop, active opaque toggle
bindd = $mainMod SHIFT, K, search keybinds, exec, $scriptsDir/input/keybinds.sh
bindd = $mainMod SHIFT, A, animations menu, exec, $scriptsDir/display/animations.sh
bindd = $mainMod SHIFT, O, change oh-my-zsh theme, exec, $scriptsDir/display/zsh-change-theme.sh
bindlnd = ALT_L, SHIFT_L, switch keyboard layout globally, exec, $scriptsDir/input/keyboard-layout.sh switch
bindlnd = SHIFT_L, ALT_L, switch keyboard layout per-window, exec, $scriptsDir/input/tak0-per-window-switch.sh
bindd = $mainMod ALT, C, calculator, exec, $scriptsDir/rofi/rofi-calc.sh

# ── Waybar (optional — uncomment if waybar is enabled in autostart.conf) ──
# bindd = $mainMod CTRL ALT, B, toggle waybar visibility, exec, pkill -SIGUSR1 waybar
# bindd = $mainMod CTRL, B, waybar style menu, exec, $scriptsDir/display/waybar-style.sh
# bindd = $mainMod ALT, B, waybar layout menu, exec, $scriptsDir/display/waybar-layout.sh

# ── Window Management ──
bindd = $mainMod SHIFT, F, fullscreen, fullscreen
bindd = $mainMod CTRL, F, maximize window, fullscreen, 1
bindd = $mainMod, SPACE, toggle floating, togglefloating,
bindd = $mainMod ALT, SPACE, float all windows, exec, hyprctl dispatch workspaceopt allfloat
bindd = $mainMod SHIFT, Return, dropdown terminal, exec, $scriptsDir/services/dropterminal.sh $term

# ── Session ──
bindd = CTRL ALT, Delete, exit hyprland, exec, hyprctl dispatch exit 0
bindd = $mainMod, Q, close window, killactive,
bindd = $mainMod SHIFT, Q, kill process, exec, $scriptsDir/session/kill-active-process.sh
bindd = CTRL ALT, L, session menu, exec, qs -c noctalia-shell ipc call sessionMenu toggle

# ── Master Layout ──
bindd = $mainMod CTRL, D, remove master, layoutmsg, removemaster
bindd = $mainMod, I, add master, layoutmsg, addmaster
bindd = $mainMod CTRL, Return, swap with master, layoutmsg, swapwithmaster

# ── Dwindle Layout ──
bindd = $mainMod SHIFT, I, toggle split, togglesplit
bindd = $mainMod, P, toggle pseudo, pseudo,

# ── Split Ratio ──
bindd = $mainMod, M, set split ratio 0.3, exec, hyprctl dispatch splitratio 0.3

# ── Layout-Aware Keybinds ──
exec-once = $scriptsDir/input/change-layout.sh init

# ── Focus Navigation ──
bindd = ALT, tab, cycle next window, cyclenext
bindd = ALT, tab, bring active to top, bringactivetotop
bindd = $mainMod, left, focus left, movefocus, l
bindd = $mainMod, right, focus right, movefocus, r
bindd = $mainMod, up, focus up, movefocus, u
bindd = $mainMod, down, focus down, movefocus, d

# ── Resize Windows ──
binded = $mainMod SHIFT, left, resize left, resizeactive, -50 0
binded = $mainMod SHIFT, right, resize right, resizeactive, 50 0
binded = $mainMod SHIFT, up, resize up, resizeactive, 0 -50
binded = $mainMod SHIFT, down, resize down, resizeactive, 0 50

# ── Move Windows ──
bindd = $mainMod CTRL, left, move left, movewindow, l
bindd = $mainMod CTRL, right, move right, movewindow, r
bindd = $mainMod CTRL, up, move up, movewindow, u
bindd = $mainMod CTRL, down, move down, movewindow, d

# ── Swap Windows ──
bindd = $mainMod ALT, left, swap left, swapwindow, l
bindd = $mainMod ALT, right, swap right, swapwindow, r
bindd = $mainMod ALT, up, swap up, swapwindow, u
bindd = $mainMod ALT, down, swap down, swapwindow, d

# ── Groups ──
bindd = $mainMod, G, toggle group, togglegroup
bindd = $mainMod, Tab, next in group, changegroupactive, f
bindd = $mainMod CTRL, tab, change group active, changegroupactive
bindd = $mainMod SHIFT, Tab, prev in group, changegroupactive, b
bindd = $mainMod CTRL, K, move into group left, moveintogroup, l
bindd = $mainMod CTRL, L, move into group right, moveintogroup, r
bindd = $mainMod CTRL, H, move out of group, moveoutofgroup

# ── Workspace Switching ──
bindd = $mainMod, tab, next workspace, workspace, m+1
bindd = $mainMod SHIFT, tab, previous workspace, workspace, m-1
bindd = $mainMod, code:10, workspace 1, workspace, 1
bindd = $mainMod, code:11, workspace 2, workspace, 2
bindd = $mainMod, code:12, workspace 3, workspace, 3
bindd = $mainMod, code:13, workspace 4, workspace, 4
bindd = $mainMod, code:14, workspace 5, workspace, 5
bindd = $mainMod, code:15, workspace 6, workspace, 6
bindd = $mainMod, code:16, workspace 7, workspace, 7
bindd = $mainMod, code:17, workspace 8, workspace, 8
bindd = $mainMod, code:18, workspace 9, workspace, 9
bindd = $mainMod, code:19, workspace 10, workspace, 10

# ── Move to Workspace (Follow) ──
bindd = $mainMod SHIFT, code:10, move to workspace 1, movetoworkspace, 1
bindd = $mainMod SHIFT, code:11, move to workspace 2, movetoworkspace, 2
bindd = $mainMod SHIFT, code:12, move to workspace 3, movetoworkspace, 3
bindd = $mainMod SHIFT, code:13, move to workspace 4, movetoworkspace, 4
bindd = $mainMod SHIFT, code:14, move to workspace 5, movetoworkspace, 5
bindd = $mainMod SHIFT, code:15, move to workspace 6, movetoworkspace, 6
bindd = $mainMod SHIFT, code:16, move to workspace 7, movetoworkspace, 7
bindd = $mainMod SHIFT, code:17, move to workspace 8, movetoworkspace, 8
bindd = $mainMod SHIFT, code:18, move to workspace 9, movetoworkspace, 9
bindd = $mainMod SHIFT, code:19, move to workspace 10, movetoworkspace, 10
bindd = $mainMod SHIFT, bracketleft, move to prev workspace, movetoworkspace, -1
bindd = $mainMod SHIFT, bracketright, move to next workspace, movetoworkspace, +1

# ── Move to Workspace (Silent) ──
bindd = $mainMod CTRL, code:10, move silently to workspace 1, movetoworkspacesilent, 1
bindd = $mainMod CTRL, code:11, move silently to workspace 2, movetoworkspacesilent, 2
bindd = $mainMod CTRL, code:12, move silently to workspace 3, movetoworkspacesilent, 3
bindd = $mainMod CTRL, code:13, move silently to workspace 4, movetoworkspacesilent, 4
bindd = $mainMod CTRL, code:14, move silently to workspace 5, movetoworkspacesilent, 5
bindd = $mainMod CTRL, code:15, move silently to workspace 6, movetoworkspacesilent, 6
bindd = $mainMod CTRL, code:16, move silently to workspace 7, movetoworkspacesilent, 7
bindd = $mainMod CTRL, code:17, move silently to workspace 8, movetoworkspacesilent, 8
bindd = $mainMod CTRL, code:18, move silently to workspace 9, movetoworkspacesilent, 9
bindd = $mainMod CTRL, code:19, move silently to workspace 10, movetoworkspacesilent, 10
bindd = $mainMod CTRL, bracketleft, move silently to prev workspace, movetoworkspacesilent, -1
bindd = $mainMod CTRL, bracketright, move silently to next workspace, movetoworkspacesilent, +1

# ── Move Workspace to Monitor ──
bindd = $mainMod CTRL, F9, workspace to left monitor, movecurrentworkspacetomonitor, l
bindd = $mainMod CTRL, F10, workspace to right monitor, movecurrentworkspacetomonitor, r
bindd = $mainMod CTRL, F11, workspace to upper monitor, movecurrentworkspacetomonitor, u
bindd = $mainMod CTRL, F12, workspace to lower monitor, movecurrentworkspacetomonitor, d

# ── Scroll Workspaces ──
bindd = $mainMod, mouse_down, next workspace, workspace, e+1
bindd = $mainMod, mouse_up, previous workspace, workspace, e-1
bindd = $mainMod, period, next workspace, workspace, e+1
bindd = $mainMod, comma, previous workspace, workspace, e-1

# ── Special Workspace ──
bindd = $mainMod SHIFT, U, move to special, movetoworkspace, special
bindd = $mainMod, U, toggle special, togglespecialworkspace,

# ── Mouse Binds ──
bindmd = $mainMod, mouse:272, move window, movewindow
bindmd = $mainMod, mouse:273, resize window, resizewindow

# ── Desktop Zoom ──
bindd = $mainMod ALT, mouse_down, zoom in, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor * 2.0}')"
bindd = $mainMod ALT, mouse_up, zoom out, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor / 2.0}')"

# ── Volume (noctalia-shell) ──
bindeld = , xf86audiolowervolume, volume down, exec, qs -c noctalia-shell ipc call volume decrease
bindeld = , xf86audioraisevolume, volume up, exec, qs -c noctalia-shell ipc call volume increase
bindld = , xf86AudioMicMute, toggle mic mute, exec, qs -c noctalia-shell ipc call volume muteInput
bindld = , xf86audiomute, toggle mute, exec, qs -c noctalia-shell ipc call volume muteOutput

# ── Media Controls ──
bindld = , xf86Sleep, sleep, exec, systemctl suspend
bindld = , xf86Rfkill, airplane mode, exec, $scriptsDir/airplane-mode.sh
bindld = , xf86AudioPlayPause, play/pause, exec, $scriptsDir/media-ctrl.sh --pause
bindld = , xf86AudioPause, pause, exec, $scriptsDir/media-ctrl.sh --pause
bindld = , xf86AudioPlay, play, exec, $scriptsDir/media-ctrl.sh --pause
bindld = , xf86AudioNext, next track, exec, $scriptsDir/media-ctrl.sh --nxt
bindld = , xf86AudioPrev, prev track, exec, $scriptsDir/media-ctrl.sh --prv
bindld = , xf86audiostop, stop, exec, $scriptsDir/media-ctrl.sh --stop

# ── Screenshots ──
bindd = $mainMod, Print, screenshot now, exec, $scriptsDir/screenshot.sh --now
bindd = $mainMod SHIFT, Print, screenshot area, exec, $scriptsDir/screenshot.sh --area
bindd = $mainMod CTRL, Print, screenshot in 5s, exec, $scriptsDir/screenshot.sh --in5
bindd = $mainMod CTRL SHIFT, Print, screenshot in 10s, exec, $scriptsDir/screenshot.sh --in10
bindd = ALT, Print, screenshot active window, exec, $scriptsDir/screenshot.sh --active
bindd = $mainMod SHIFT, S, screenshot (swappy), exec, $scriptsDir/screenshot.sh --swappy

# ── Laptop: Brightness (noctalia-shell) ──
binde = , xf86MonBrightnessDown, exec, qs -c noctalia-shell ipc call brightness decrease
binde = , xf86MonBrightnessUp, exec, qs -c noctalia-shell ipc call brightness increase

# ── Laptop: ASUS ROG ──
bind = , xf86Launch1, exec, rog-control-center
bind = , xf86Launch3, exec, asusctl led-mode -n
bind = , xf86Launch4, exec, asusctl profile -n

# ── Laptop: Touchpad & F6 Screenshots ──
bind = , xf86TouchpadToggle, exec, $scriptsDir/touchpad.sh
bind = $mainMod, F6, exec, $scriptsDir/screenshot.sh --now
bind = $mainMod SHIFT, F6, exec, $scriptsDir/screenshot.sh --area
bind = $mainMod CTRL, F6, exec, $scriptsDir/screenshot.sh --in5
bind = $mainMod ALT, F6, exec, $scriptsDir/screenshot.sh --in10
bind = ALT, F6, exec, $scriptsDir/screenshot.sh --active
