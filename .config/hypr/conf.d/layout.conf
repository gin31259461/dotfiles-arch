# ── General ──
general {
  resize_on_border = true
  layout = scrolling
}

# ── Dwindle Layout ──
dwindle {
  pseudotile = true
  preserve_split = true
  special_scale_factor = 0.8
}

# ── Master Layout ──
master {
  new_status = master
  new_on_top = 1
  mfact = 0.5
}

# ── Scrolling Layout (hyprscrolling plugin) ──
plugin {
  hyprscrolling {
    column_width = 0.5
    fullscreen_on_one_column = false
    explicit_column_widths = 0.333, 0.5, 0.667, 1.0
    focus_fit_method = 0
    follow_focus = true
    follow_debounce_ms = 0
  }
}
