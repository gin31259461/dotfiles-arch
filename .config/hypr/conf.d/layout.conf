# ── General ──
general {
  resize_on_border = true
  layout = scrolling
}

# ── Dwindle Layout ──
dwindle {
  pseudotile = true
  preserve_split = true
  special_scale_factor = 0.8
}

# ── Master Layout ──
master {
  new_status = master
  new_on_top = 1
  mfact = 0.5
}

# ── Scrolling Layout ──
scrolling {
  column_width = 0.5
  fullscreen_on_one_column = true
  explicit_column_widths = 0.333, 0.5, 0.667, 1.0
  follow_focus = true
  focus_fit_method = 1
}
