# ── Wallust Colors ──

source = $HOME/.config/hypr/wallust/wallust-hyprland.conf

# ── General ──

general {
  border_size = 2
  gaps_in = 5
  gaps_out = 10
  col.active_border = $color12
  col.inactive_border = $color10
}

# ── Decoration ──

decoration {
  rounding = 20
  rounding_power = 2
  active_opacity = 1.0
  inactive_opacity = 0.9
  fullscreen_opacity = 1.0
  dim_inactive = true
  dim_strength = 0.1
  dim_special = 0.8

  shadow {
    enabled = true
    range = 4
    render_power = 3
    color = $color12
    color_inactive = $color10
  }

  blur {
    enabled = true
    size = 3
    passes = 2
    ignore_opacity = true
    new_optimizations = true
    special = true
    popups = true
    vibrancy = 0.1696
  }
}

# ── Group ──

group {
  col.border_active = $color15

  groupbar {
    col.active = $color0
  }
}

# ── Animations ──
# Managed by scripts/animations.sh — edit conf.d/animations.conf directly
# or use SUPER+SHIFT+A to switch presets from the animations/ directory.

source = $HOME/.config/hypr/conf.d/animations.conf
