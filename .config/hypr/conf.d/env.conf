# Environment variables — https://wiki.hyprland.org/Configuring/Environment-variables/

# ── Default Apps & Editor ──
# QuickSettings (SUPER SHIFT E) uses $EDITOR with nano as fallback
env = EDITOR,nvim
$edit = ${EDITOR:-nano}
# Used by scripts that launch terminal or file manager
$term = kitty
$files = thunar
# Used by RofiSearch (SUPER S)
$Search_Engine = "https://www.google.com/search?q="

# ── Toolkit Backends ──
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = CLUTTER_BACKEND,wayland

# ── XDG Specifications ──
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

# ── Qt Variables ──
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORMTHEME,gtk3
env = QT_SCALE_FACTOR,1

# ── Hyprland Qt Support ──
env = QT_QUICK_CONTROLS_STYLE,org.hyprland.style

# ── XWayland Scaling ──
# Match your monitor scale from monitors.conf (1 = 100%, 1.5 = 150%)
# See https://wiki.hyprland.org/Configuring/XWayland/
env = GDK_SCALE,1
# env = QT_SCALE_FACTOR,1   # uncomment if XWayland apps appear too small

# ── Cursor Theme ──
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24

# ── Firefox / Electron Wayland ──
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# ── GPU (Mesa / AMD) ──
# Swap for Nvidia-specific vars if needed — see https://wiki.hyprland.org/Nvidia/
env = __GLX_VENDOR_LIBRARY_NAME,mesa
env = GBM_BACKEND,drm

# ── Input Method (fcitx5) ──
# env = GTK_IM_MODULE,fcitx   # uncomment if GTK apps don't pick up fcitx5
env = QT_IM_MODULE,fcitx
env = XMODIFIERS,@im=fcitx
env = GLFW_IM_MODULE,ibus
env = INPUT_METHOD,fcitx
env = IMSETTINGS_MODULE,fcitx
env = SDL_IM_MODULE,fcitx
