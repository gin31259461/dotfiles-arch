# Laptop-specific config: lid-switch binds and touchpad device name
# See https://wiki.hyprland.org/Configuring/Binds/#switches
# Use `hyprctl devices` to find your touchpad device name for TouchPad.sh

$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts

# Disable/enable laptop monitor when lid is closed/opened
# Uncomment and set your display name (e.g. eDP-1) to use:
#bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, preferred, auto, 1"
#bindl = , switch:on:Lid Switch,  exec, hyprctl keyword monitor "eDP-1, disable"

# Alternative: write monitor config to monitors.conf on lid events
# (requires manual monitors.conf management — use nwg-displays instead)
#bindl = , switch:off:Lid Switch, exec, echo "monitor = eDP-1, preferred, auto, 1" > $HOME/.config/hypr/monitors.conf
#bindl = , switch:on:Lid Switch,  exec, echo "monitor = eDP-1, disable" > $HOME/.config/hypr/monitors.conf
