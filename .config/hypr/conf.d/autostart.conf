# Autostart Applications

$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts

# ── System / Session ─────────────────────────────────────────
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# ── Core Services ────────────────────────────────────────────
exec-once = $scriptsDir/Polkit.sh
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = rog-control-center

# ── Shell / Bar ──────────────────────────────────────────────
exec-once = ags
exec-once = qs -c overview
exec-once = qs -c noctalia-shell

# ── Clipboard ────────────────────────────────────────────────
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ── Input Method ─────────────────────────────────────────────
exec-once = fcitx5

# ── User Applications ───────────────────────────────────────
exec-once = vesktop --start-minimized --enable-features=UseOzonePlatform --ozone-platform-hint=wayland --enable-wayland-ime
exec-once = remmina -i
exec-once = tailscale systray

# ── Utilities ────────────────────────────────────────────────
exec-once = $HOME/.config/hypr/scripts/Dropterminal.sh kitty &
exec-once = $scriptsDir/KeybindsLayoutInit.sh
