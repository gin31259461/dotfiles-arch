# Autostart Applications

$scriptsDir = $HOME/.config/hypr/scripts

# ── System / Session ─────────────────────────────────────────
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# ── System Hardware Control ────────────────────────────────────────────
exec-once = uwsm app -- rog-control-center
exec-once = uwsm app -- mcontrolcenter
exec-once = uwsm app -- polychromatic-tray-applet

# ── Core Services ────────────────────────────────────────────
exec-once = $scriptsDir/services/polkit.sh
exec-once = uwsm app -- nm-applet --indicator
exec-once = uwsm app -- blueman-applet

# ── Shell / Bar ──────────────────────────────────────────────
exec-once = ags
exec-once = qs -c overview
exec-once = qs -c noctalia-shell
# exec-once = waybar   # optional — uncomment to enable waybar alongside noctalia-shell

# ── Clipboard ────────────────────────────────────────────────
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ── Input Method ─────────────────────────────────────────────
exec-once = uwsm app -- fcitx5

# ── User Applications ───────────────────────────────────────
exec-once = sleep 3; uwsm app -- vesktop --start-minimized --enable-features=UseOzonePlatform --ozone-platform-hint=wayland --enable-wayland-ime
exec-once = uwsm app -- remmina -i

# for VPN/NAT traversal
exec-once = uwsm app -- tailscale systray

# Self-hosted streaming host
# Client (Moonlight): https://moonlight-stream.org
# Need to be config on web ui first (default port 47990 blelow):
# https://localhost:47990
# docs: https://docs.lizardbyte.dev/projects/sunshine/latest/index.html
exec-once = uwsm app -- sunshine


# ── Utilities ────────────────────────────────────────────────
exec-once = $HOME/.config/hypr/scripts/services/dropterminal.sh kitty &
exec-once = $scriptsDir/input/keybinds-layout-init.sh

# ── Wallpaper (swww) — default disabled ─────────────────────
# Uncomment the swww-daemon line (and one wallpaper line) to enable.
# exec-once = swww-daemon --format xrgb
#
# Static/random wallpaper via wallpaper-select.sh (SUPER W):
